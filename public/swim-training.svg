<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="waterTrain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0284c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c4a6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd9b4" />
      <stop offset="100%" style="stop-color:#f0a870" />
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="800" height="600" fill="url(#waterTrain)"/>

  <!-- Perspectiva de la alberca desde arriba (3/4 view) -->
  <!-- Borde de la alberca -->
  <rect x="40" y="60" width="720" height="440" rx="16" fill="#cbd5e1"/>
  <rect x="60" y="80" width="680" height="400" rx="12" fill="#7dd3fc"/>

  <!-- Carriles (líneas de fondo) -->
  <line x1="60" y1="148" x2="740" y2="148" stroke="#0369a1" stroke-width="3" opacity="0.6"/>
  <line x1="60" y1="215" x2="740" y2="215" stroke="#0369a1" stroke-width="3" opacity="0.6"/>
  <line x1="60" y1="282" x2="740" y2="282" stroke="#0369a1" stroke-width="3" opacity="0.6"/>
  <line x1="60" y1="349" x2="740" y2="349" stroke="#0369a1" stroke-width="3" opacity="0.6"/>
  <line x1="60" y1="416" x2="740" y2="416" stroke="#0369a1" stroke-width="3" opacity="0.6"/>

  <!-- Cuerdas de carril -->
  <!-- Cuerda 1 -->
  <line x1="60" y1="148" x2="740" y2="148" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="120" cy="148" r="5" fill="#ef4444"/><circle cx="180" cy="148" r="5" fill="white"/><circle cx="240" cy="148" r="5" fill="#ef4444"/>
  <circle cx="300" cy="148" r="5" fill="white"/><circle cx="360" cy="148" r="5" fill="#ef4444"/><circle cx="420" cy="148" r="5" fill="white"/>
  <circle cx="480" cy="148" r="5" fill="#ef4444"/><circle cx="540" cy="148" r="5" fill="white"/><circle cx="600" cy="148" r="5" fill="#ef4444"/>
  <circle cx="660" cy="148" r="5" fill="white"/><circle cx="720" cy="148" r="5" fill="#ef4444"/>

  <!-- Cuerda 2 -->
  <line x1="60" y1="215" x2="740" y2="215" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="120" cy="215" r="5" fill="#3b82f6"/><circle cx="180" cy="215" r="5" fill="white"/><circle cx="240" cy="215" r="5" fill="#3b82f6"/>
  <circle cx="300" cy="215" r="5" fill="white"/><circle cx="360" cy="215" r="5" fill="#3b82f6"/><circle cx="420" cy="215" r="5" fill="white"/>
  <circle cx="480" cy="215" r="5" fill="#3b82f6"/><circle cx="540" cy="215" r="5" fill="white"/><circle cx="600" cy="215" r="5" fill="#3b82f6"/>
  <circle cx="660" cy="215" r="5" fill="white"/><circle cx="720" cy="215" r="5" fill="#3b82f6"/>

  <!-- Cuerda 3 -->
  <line x1="60" y1="282" x2="740" y2="282" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="120" cy="282" r="5" fill="#ef4444"/><circle cx="180" cy="282" r="5" fill="white"/><circle cx="240" cy="282" r="5" fill="#ef4444"/>
  <circle cx="300" cy="282" r="5" fill="white"/><circle cx="360" cy="282" r="5" fill="#ef4444"/><circle cx="420" cy="282" r="5" fill="white"/>
  <circle cx="480" cy="282" r="5" fill="#ef4444"/><circle cx="540" cy="282" r="5" fill="white"/><circle cx="600" cy="282" r="5" fill="#ef4444"/>
  <circle cx="660" cy="282" r="5" fill="white"/><circle cx="720" cy="282" r="5" fill="#ef4444"/>

  <!-- Cuerda 4 -->
  <line x1="60" y1="349" x2="740" y2="349" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="120" cy="349" r="5" fill="#3b82f6"/><circle cx="240" cy="349" r="5" fill="white"/><circle cx="360" cy="349" r="5" fill="#3b82f6"/>
  <circle cx="480" cy="349" r="5" fill="white"/><circle cx="600" cy="349" r="5" fill="#3b82f6"/><circle cx="720" cy="349" r="5" fill="white"/>

  <!-- Nadadores en distintas posiciones -->
  <!-- Nadador 1 - carril 1 (entre y=80 y y=148) -->
  <ellipse cx="350" cy="114" rx="55" ry="11" fill="url(#skinT)"/>
  <circle cx="395" cy="106" r="14" fill="url(#skinT)"/>
  <ellipse cx="395" cy="98" rx="14" ry="9" fill="#1e40af"/>
  <path d="M382 106 Q420 90 445 80" stroke="url(#skinT)" stroke-width="9" fill="none" stroke-linecap="round"/>
  <ellipse cx="320" cy="116" rx="22" ry="9" fill="#2563eb"/>

  <!-- Nadador 2 - carril 2 (entre y=148 y y=215) -->
  <ellipse cx="200" cy="181" rx="50" ry="10" fill="url(#skinT)" transform="rotate(3, 200, 181)"/>
  <circle cx="242" cy="174" r="13" fill="url(#skinT)"/>
  <ellipse cx="242" cy="166" rx="13" ry="8" fill="#dc2626"/>
  <path d="M230 174 Q265 158 288 150" stroke="url(#skinT)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <ellipse cx="170" cy="183" rx="20" ry="8" fill="#dc2626"/>
  <!-- Salpicaduras -->
  <circle cx="295" cy="144" r="4" fill="white" opacity="0.8"/>
  <circle cx="305" cy="138" r="3" fill="white" opacity="0.6"/>

  <!-- Nadador 3 - carril 3 (entre y=215 y y=282) -->
  <ellipse cx="560" cy="248" rx="55" ry="11" fill="url(#skinT)" transform="rotate(-2, 560, 248)"/>
  <circle cx="607" cy="240" r="14" fill="url(#skinT)"/>
  <ellipse cx="607" cy="231" rx="14" ry="9" fill="#059669"/>
  <path d="M594 240 Q630 225 655 216" stroke="url(#skinT)" stroke-width="9" fill="none" stroke-linecap="round"/>
  <ellipse cx="528" cy="250" rx="22" ry="9" fill="#059669"/>

  <!-- Nadador 4 - carril 4 (entre y=282 y y=349) -->
  <ellipse cx="400" cy="315" rx="52" ry="11" fill="url(#skinT)" transform="rotate(1, 400, 315)"/>
  <circle cx="444" cy="307" r="14" fill="url(#skinT)"/>
  <ellipse cx="444" cy="298" rx="14" ry="9" fill="#7c3aed"/>
  <path d="M432 307 Q465 292 488 283" stroke="url(#skinT)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <ellipse cx="370" cy="317" rx="21" ry="9" fill="#7c3aed"/>

  <!-- Nadador 5 - carril 5 (entre y=349 y y=416) -->
  <ellipse cx="250" cy="382" rx="50" ry="10" fill="url(#skinT)" transform="rotate(-3, 250, 382)"/>
  <circle cx="292" cy="374" r="13" fill="url(#skinT)"/>
  <ellipse cx="292" cy="365" rx="13" ry="8" fill="#0f172a"/>
  <path d="M280 374 Q312 360 335 352" stroke="url(#skinT)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <ellipse cx="220" cy="384" rx="20" ry="8" fill="#f97316"/>

  <!-- Texto -->
  <text x="400" y="545" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Entrenamiento en Equipo — Todos los Niveles</text>
</svg>
