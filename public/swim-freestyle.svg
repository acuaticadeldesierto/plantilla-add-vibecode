<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Fondo agua -->
  <defs>
    <linearGradient id="water1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skin1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c5a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8a87c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="800" height="600" fill="url(#water1)" />

  <!-- Líneas de carril -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#38bdf8" stroke-width="3" stroke-dasharray="20,15" opacity="0.4"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#38bdf8" stroke-width="3" stroke-dasharray="20,15" opacity="0.4"/>
  <line x1="0" y1="450" x2="800" y2="450" stroke="#38bdf8" stroke-width="3" stroke-dasharray="20,15" opacity="0.4"/>

  <!-- Ondas del agua -->
  <path d="M0 200 Q100 185 200 200 Q300 215 400 200 Q500 185 600 200 Q700 215 800 200" stroke="#7dd3fc" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M0 350 Q100 335 200 350 Q300 365 400 350 Q500 335 600 350 Q700 365 800 350" stroke="#7dd3fc" stroke-width="3" fill="none" opacity="0.5"/>

  <!-- Nadador estilo libre -->
  <!-- Cuerpo -->
  <ellipse cx="400" cy="260" rx="120" ry="22" fill="url(#skin1)" transform="rotate(-8, 400, 260)"/>
  <!-- Cabeza -->
  <circle cx="510" cy="240" r="28" fill="url(#skin1)"/>
  <!-- Gorra -->
  <ellipse cx="510" cy="228" rx="28" ry="18" fill="#0f172a"/>
  <!-- Gafas -->
  <rect x="495" y="238" width="14" height="9" rx="4" fill="#1e40af" opacity="0.8"/>
  <rect x="512" y="238" width="14" height="9" rx="4" fill="#1e40af" opacity="0.8"/>
  <line x1="509" y1="242" x2="512" y2="242" stroke="#1e40af" stroke-width="2"/>
  <!-- Brazo derecho extendido -->
  <path d="M490 250 Q560 220 610 195" stroke="url(#skin1)" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- Brazo izquierdo en el agua -->
  <path d="M380 270 Q320 290 290 310" stroke="url(#skin1)" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Piernas -->
  <path d="M290 268 Q260 280 240 285" stroke="url(#skin1)" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M290 272 Q255 295 235 305" stroke="url(#skin1)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Traje de baño -->
  <ellipse cx="380" cy="268" rx="35" ry="18" fill="#1e40af" transform="rotate(-8, 380, 268)"/>

  <!-- Salpicaduras -->
  <circle cx="620" cy="188" r="6" fill="white" opacity="0.7"/>
  <circle cx="635" cy="178" r="4" fill="white" opacity="0.5"/>
  <circle cx="608" cy="175" r="5" fill="white" opacity="0.6"/>
  <circle cx="598" cy="185" r="3" fill="white" opacity="0.4"/>

  <!-- Estela de agua -->
  <path d="M270 295 Q230 300 200 295" stroke="#bae6fd" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M260 308 Q220 315 195 308" stroke="#bae6fd" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Texto -->
  <text x="400" y="540" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">Estilo Libre — Técnica y Velocidad</text>
</svg>
