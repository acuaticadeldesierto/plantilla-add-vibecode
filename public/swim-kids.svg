<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="waterKids" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinK" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd9b4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5b887;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fondo sky -->
  <rect width="800" height="600" fill="#e0f2fe"/>

  <!-- Agua -->
  <rect y="300" width="800" height="300" fill="url(#waterKids)"/>

  <!-- Borde de la alberca -->
  <rect y="295" width="800" height="12" fill="#93c5fd"/>

  <!-- Ondas del agua -->
  <path d="M0 320 Q100 305 200 320 Q300 335 400 320 Q500 305 600 320 Q700 335 800 320" stroke="white" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M0 360 Q80 348 160 360 Q240 372 320 360 Q400 348 480 360 Q560 372 640 360 Q720 348 800 360" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- Niño 1 - con flotadores -->
  <!-- Cuerpo en el agua -->
  <ellipse cx="180" cy="318" rx="35" ry="15" fill="url(#skinK)"/>
  <circle cx="207" cy="308" r="22" fill="url(#skinK)"/>
  <!-- Cabello -->
  <ellipse cx="207" cy="294" rx="22" ry="14" fill="#92400e"/>
  <!-- Ojos felices -->
  <circle cx="200" cy="307" r="3" fill="#1e293b"/>
  <circle cx="214" cy="307" r="3" fill="#1e293b"/>
  <!-- Sonrisa -->
  <path d="M199 314 Q207 320 215 314" stroke="#1e293b" stroke-width="2" fill="none"/>
  <!-- Flotadores naranjas en brazos -->
  <ellipse cx="155" cy="318" rx="18" ry="10" fill="#f97316" opacity="0.9"/>
  <ellipse cx="205" cy="326" rx="18" ry="10" fill="#f97316" opacity="0.9"/>
  <!-- Traje -->
  <ellipse cx="180" cy="320" rx="28" ry="12" fill="#3b82f6"/>
  <!-- Salpicadura -->
  <circle cx="140" cy="308" r="5" fill="white" opacity="0.7"/>
  <circle cx="148" cy="298" r="3" fill="white" opacity="0.5"/>

  <!-- Niña 2 - aprendiendo patada -->
  <ellipse cx="400" cy="316" rx="40" ry="14" fill="url(#skinK)"/>
  <circle cx="434" cy="305" r="24" fill="url(#skinK)"/>
  <!-- Trenzas -->
  <ellipse cx="434" cy="290" rx="24" ry="15" fill="#7c3aed"/>
  <path d="M422 295 Q416 320 418 340" stroke="#7c3aed" stroke-width="5" fill="none"/>
  <path d="M446 295 Q452 320 450 340" stroke="#7c3aed" stroke-width="5" fill="none"/>
  <!-- Ojos -->
  <circle cx="427" cy="304" r="3" fill="#1e293b"/>
  <circle cx="441" cy="304" r="3" fill="#1e293b"/>
  <path d="M426 311 Q434 317 442 311" stroke="#1e293b" stroke-width="2" fill="none"/>
  <!-- Traje rosa -->
  <ellipse cx="400" cy="318" rx="32" ry="12" fill="#ec4899"/>
  <!-- Piernas pateando -->
  <path d="M368 318 Q345 330 330 325" stroke="url(#skinK)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M368 322 Q342 340 325 340" stroke="url(#skinK)" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- Salpicaduras -->
  <circle cx="320" cy="318" r="6" fill="white" opacity="0.8"/>
  <circle cx="310" cy="308" r="4" fill="white" opacity="0.6"/>
  <circle cx="330" cy="305" r="3" fill="white" opacity="0.5"/>

  <!-- Instructor/Entrenador -->
  <rect x="570" y="240" width="80" height="90" rx="10" fill="#f1f5f9"/>
  <!-- Cuerpo entrenador de pie en el borde -->
  <ellipse cx="610" cy="270" rx="22" ry="30" fill="#1e40af"/>
  <circle cx="610" cy="242" r="22" fill="url(#skinK)"/>
  <!-- Gorra entrenador -->
  <rect x="590" y="228" width="40" height="12" rx="6" fill="#0f172a"/>
  <rect x="585" y="234" width="50" height="6" rx="3" fill="#0f172a"/>
  <!-- Brazo extendido hacia niños -->
  <path d="M590 265 Q550 280 520 290" stroke="url(#skinK)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Tablita -->
  <rect x="505" y="283" width="40" height="25" rx="4" fill="#fbbf24"/>
  <!-- Piernas -->
  <rect x="596" y="297" width="14" height="35" rx="5" fill="#1e3a8a"/>
  <rect x="614" y="297" width="14" height="35" rx="5" fill="#1e3a8a"/>
  <!-- Zapatos -->
  <ellipse cx="603" cy="334" rx="12" ry="7" fill="#0f172a"/>
  <ellipse cx="621" cy="334" rx="12" ry="7" fill="#0f172a"/>

  <!-- Texto burbuja del instructor -->
  <rect x="630" y="200" width="140" height="45" rx="10" fill="white" opacity="0.9"/>
  <path d="M640 245 L630 260 L655 245" fill="white" opacity="0.9"/>
  <text x="700" y="220" font-family="Arial" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">¡Muy bien!</text>
  <text x="700" y="237" font-family="Arial" font-size="13" fill="#334155" text-anchor="middle">Sigue pateando</text>

  <!-- Texto -->
  <text x="400" y="555" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0369a1" text-anchor="middle">Clases para Niños — Aprendemos Juntos</text>
</svg>
