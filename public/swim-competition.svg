<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="waterComp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#075985;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd9b4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0a870;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="block" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="800" height="600" fill="#0c4a6e"/>

  <!-- Agua -->
  <rect y="220" width="800" height="280" fill="url(#waterComp)"/>

  <!-- Plataformas de salida -->
  <!-- Plataforma 1 -->
  <rect x="20" y="170" width="70" height="55" rx="4" fill="url(#block)"/>
  <rect x="20" y="220" width="70" height="8" rx="2" fill="#92400e"/>
  <!-- Número -->
  <text x="55" y="205" font-family="Arial" font-size="20" font-weight="bold" fill="white" text-anchor="middle">1</text>

  <!-- Plataforma 2 -->
  <rect x="160" y="170" width="70" height="55" rx="4" fill="url(#block)"/>
  <rect x="160" y="220" width="70" height="8" rx="2" fill="#92400e"/>
  <text x="195" y="205" font-family="Arial" font-size="20" font-weight="bold" fill="white" text-anchor="middle">2</text>

  <!-- Plataforma 3 -->
  <rect x="300" y="170" width="70" height="55" rx="4" fill="url(#block)"/>
  <rect x="300" y="220" width="70" height="8" rx="2" fill="#92400e"/>
  <text x="335" y="205" font-family="Arial" font-size="20" font-weight="bold" fill="white" text-anchor="middle">3</text>

  <!-- Plataforma 4 -->
  <rect x="440" y="170" width="70" height="55" rx="4" fill="url(#block)"/>
  <rect x="440" y="220" width="70" height="8" rx="2" fill="#92400e"/>
  <text x="475" y="205" font-family="Arial" font-size="20" font-weight="bold" fill="white" text-anchor="middle">4</text>

  <!-- Plataforma 5 -->
  <rect x="580" y="170" width="70" height="55" rx="4" fill="url(#block)"/>
  <rect x="580" y="220" width="70" height="8" rx="2" fill="#92400e"/>
  <text x="615" y="205" font-family="Arial" font-size="20" font-weight="bold" fill="white" text-anchor="middle">5</text>

  <!-- Cuerdas de carril -->
  <line x1="130" y1="228" x2="130" y2="490" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="130" cy="260" r="6" fill="#ef4444"/>
  <circle cx="130" cy="300" r="6" fill="white"/>
  <circle cx="130" cy="340" r="6" fill="#ef4444"/>
  <circle cx="130" cy="380" r="6" fill="white"/>
  <circle cx="130" cy="420" r="6" fill="#ef4444"/>

  <line x1="270" y1="228" x2="270" y2="490" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="270" cy="260" r="6" fill="#3b82f6"/>
  <circle cx="270" cy="300" r="6" fill="white"/>
  <circle cx="270" cy="340" r="6" fill="#3b82f6"/>
  <circle cx="270" cy="380" r="6" fill="white"/>
  <circle cx="270" cy="420" r="6" fill="#3b82f6"/>

  <line x1="410" y1="228" x2="410" y2="490" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="410" cy="260" r="6" fill="#ef4444"/>
  <circle cx="410" cy="300" r="6" fill="white"/>
  <circle cx="410" cy="340" r="6" fill="#ef4444"/>
  <circle cx="410" cy="380" r="6" fill="white"/>
  <circle cx="410" cy="420" r="6" fill="#ef4444"/>

  <line x1="550" y1="228" x2="550" y2="490" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="550" cy="260" r="6" fill="#3b82f6"/>
  <circle cx="550" cy="300" r="6" fill="white"/>
  <circle cx="550" cy="340" r="6" fill="#3b82f6"/>
  <circle cx="550" cy="380" r="6" fill="white"/>
  <circle cx="550" cy="420" r="6" fill="#3b82f6"/>

  <!-- Nadador 1 - lanzándose desde plataforma (posición de salida) -->
  <!-- Cuerpo inclinado -->
  <ellipse cx="60" cy="225" rx="28" ry="10" fill="url(#skinC)" transform="rotate(-30, 60, 225)"/>
  <circle cx="75" cy="210" r="16" fill="url(#skinC)"/>
  <ellipse cx="75" cy="200" rx="16" ry="10" fill="#0f172a"/>
  <!-- Brazo adelante -->
  <path d="M80 215 Q110 205 130 200" stroke="url(#skinC)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Piernas atrás -->
  <path d="M40 228 Q20 218 10 215" stroke="url(#skinC)" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Nadador 2 - en el agua estilo libre -->
  <ellipse cx="340" cy="295" rx="90" ry="16" fill="url(#skinC)" transform="rotate(-5, 340, 295)"/>
  <circle cx="420" cy="282" r="18" fill="url(#skinC)"/>
  <ellipse cx="420" cy="272" rx="18" ry="11" fill="#dc2626"/>
  <rect x="408" y="281" width="10" height="7" rx="3" fill="#1e40af" opacity="0.9"/>
  <rect x="421" y="281" width="10" height="7" rx="3" fill="#1e40af" opacity="0.9"/>
  <!-- Brazo extendido -->
  <path d="M405 283 Q460 262 490 250" stroke="url(#skinC)" stroke-width="11" fill="none" stroke-linecap="round"/>
  <!-- Salpicaduras -->
  <circle cx="500" cy="242" r="5" fill="white" opacity="0.8"/>
  <circle cx="512" cy="235" r="3" fill="white" opacity="0.6"/>
  <circle cx="495" cy="232" r="4" fill="white" opacity="0.5"/>

  <!-- Ondas agua -->
  <path d="M0 235 Q100 222 200 235 Q300 248 400 235 Q500 222 600 235 Q700 248 800 235" stroke="#7dd3fc" stroke-width="3" fill="none" opacity="0.5"/>

  <!-- Bandera de llegada -->
  <line x1="760" y1="150" x2="760" y2="320" stroke="#f1f5f9" stroke-width="4"/>
  <polygon points="760,155 800,170 760,185" fill="#22c55e"/>
  <polygon points="760,185 800,200 760,215" fill="white"/>
  <polygon points="760,215 800,230 760,245" fill="#22c55e"/>

  <!-- Cronómetro decorativo -->
  <circle cx="100" cy="100" r="50" fill="#1e293b" stroke="#f59e0b" stroke-width="4"/>
  <circle cx="100" cy="100" r="42" fill="#0f172a"/>
  <text x="100" y="95" font-family="Arial" font-size="13" fill="#94a3b8" text-anchor="middle">TIEMPO</text>
  <text x="100" y="115" font-family="Arial" font-size="19" font-weight="bold" fill="#fbbf24" text-anchor="middle">00:58.3</text>

  <!-- Texto -->
  <text x="400" y="545" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Competencia — Supera tus Marcas</text>
</svg>
