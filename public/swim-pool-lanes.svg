<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="pool" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="deck" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Deck de la alberca -->
  <rect width="800" height="120" fill="url(#deck)"/>
  <rect y="480" width="800" height="120" fill="url(#deck)"/>

  <!-- Agua -->
  <rect y="120" width="800" height="360" fill="url(#pool)"/>

  <!-- Fondo de la alberca - líneas de carril -->
  <rect x="50" y="120" width="700" height="360" fill="#0ea5e9" opacity="0.3"/>

  <!-- Líneas negras del fondo -->
  <line x1="150" y1="120" x2="150" y2="480" stroke="#0c4a6e" stroke-width="4" opacity="0.5"/>
  <line x1="270" y1="120" x2="270" y2="480" stroke="#0c4a6e" stroke-width="4" opacity="0.5"/>
  <line x1="390" y1="120" x2="390" y2="480" stroke="#0c4a6e" stroke-width="4" opacity="0.5"/>
  <line x1="510" y1="120" x2="510" y2="480" stroke="#0c4a6e" stroke-width="4" opacity="0.5"/>
  <line x1="630" y1="120" x2="630" y2="480" stroke="#0c4a6e" stroke-width="4" opacity="0.5"/>

  <!-- Línea central de cada carril -->
  <line x1="90" y1="180" x2="90" y2="420" stroke="#1e40af" stroke-width="6" opacity="0.4"/>
  <line x1="210" y1="180" x2="210" y2="420" stroke="#1e40af" stroke-width="6" opacity="0.4"/>
  <line x1="330" y1="180" x2="330" y2="420" stroke="#1e40af" stroke-width="6" opacity="0.4"/>
  <line x1="450" y1="180" x2="450" y2="420" stroke="#1e40af" stroke-width="6" opacity="0.4"/>
  <line x1="570" y1="180" x2="570" y2="420" stroke="#1e40af" stroke-width="6" opacity="0.4"/>
  <line x1="690" y1="180" x2="690" y2="420" stroke="#1e40af" stroke-width="6" opacity="0.4"/>

  <!-- Cuerdas separadoras de carril (flotadores) -->
  <!-- Carril 1 -->
  <circle cx="80" cy="300" r="7" fill="#ef4444"/>
  <circle cx="110" cy="300" r="7" fill="#ef4444"/>
  <circle cx="140" cy="300" r="7" fill="white"/>
  <line x1="50" y1="300" x2="150" y2="300" stroke="#94a3b8" stroke-width="2"/>

  <!-- Carril 2 -->
  <circle cx="200" cy="300" r="7" fill="#3b82f6"/>
  <circle cx="230" cy="300" r="7" fill="white"/>
  <circle cx="260" cy="300" r="7" fill="#3b82f6"/>
  <line x1="150" y1="300" x2="270" y2="300" stroke="#94a3b8" stroke-width="2"/>

  <!-- Carril 3 -->
  <circle cx="310" cy="300" r="7" fill="#ef4444"/>
  <circle cx="340" cy="300" r="7" fill="white"/>
  <circle cx="370" cy="300" r="7" fill="#ef4444"/>
  <line x1="270" y1="300" x2="390" y2="300" stroke="#94a3b8" stroke-width="2"/>

  <!-- Carril 4 -->
  <circle cx="420" cy="300" r="7" fill="#3b82f6"/>
  <circle cx="450" cy="300" r="7" fill="white"/>
  <circle cx="480" cy="300" r="7" fill="#3b82f6"/>
  <line x1="390" y1="300" x2="510" y2="300" stroke="#94a3b8" stroke-width="2"/>

  <!-- Carril 5 -->
  <circle cx="540" cy="300" r="7" fill="#ef4444"/>
  <circle cx="570" cy="300" r="7" fill="white"/>
  <circle cx="600" cy="300" r="7" fill="#ef4444"/>
  <line x1="510" y1="300" x2="630" y2="300" stroke="#94a3b8" stroke-width="2"/>

  <!-- Carril 6 -->
  <circle cx="650" cy="300" r="7" fill="#3b82f6"/>
  <circle cx="680" cy="300" r="7" fill="white"/>
  <circle cx="710" cy="300" r="7" fill="#3b82f6"/>
  <line x1="630" y1="300" x2="750" y2="300" stroke="#94a3b8" stroke-width="2"/>

  <!-- Ondas superficiales -->
  <path d="M0 130 Q50 120 100 130 Q150 140 200 130 Q250 120 300 130 Q350 140 400 130 Q450 120 500 130 Q550 140 600 130 Q650 120 700 130 Q750 140 800 130" stroke="white" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M0 145 Q60 135 120 145 Q180 155 240 145 Q300 135 360 145 Q420 155 480 145 Q540 135 600 145 Q660 155 720 145 Q760 138 800 145" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- Borde de la alberca -->
  <rect y="115" width="800" height="10" fill="#e2e8f0"/>
  <rect y="475" width="800" height="10" fill="#e2e8f0"/>

  <!-- Números de carril -->
  <text x="90" y="95" font-family="Arial" font-size="20" font-weight="bold" fill="#475569" text-anchor="middle">1</text>
  <text x="210" y="95" font-family="Arial" font-size="20" font-weight="bold" fill="#475569" text-anchor="middle">2</text>
  <text x="330" y="95" font-family="Arial" font-size="20" font-weight="bold" fill="#475569" text-anchor="middle">3</text>
  <text x="450" y="95" font-family="Arial" font-size="20" font-weight="bold" fill="#475569" text-anchor="middle">4</text>
  <text x="570" y="95" font-family="Arial" font-size="20" font-weight="bold" fill="#475569" text-anchor="middle">5</text>
  <text x="690" y="95" font-family="Arial" font-size="20" font-weight="bold" fill="#475569" text-anchor="middle">6</text>

  <!-- Texto -->
  <text x="400" y="555" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#334155" text-anchor="middle">Alberca Olímpica — 6 Carriles</text>
</svg>
